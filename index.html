<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <!-- 支援 iPhone 瀏海安全區與響應式縮放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>鳳甲國中設備盤點</title>

  <!-- ZXing 條碼/QR 掃描庫 -->
  <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
  <!-- 引入 Google Sign-In API -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* ========== CSS 樣式區域 ========== */
    body {
      font-family: "微軟正黑體", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #f7f7f7;
      margin: 0; padding: 30px 0;
    }
    
    /* 登入畫面樣式 */
    #login-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #f7f7f7; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .login-box {
        background: white; padding: 40px; border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
        width: 90%; max-width: 400px; border: 2px solid #e0e0e0;
    }
    .login-box h1 {
        font-size: 32px; color: #1565c0; margin: 0 0 10px 0; background: none; -webkit-text-fill-color: initial;
    }
    .login-box p {
        font-size: 16px; color: #666; margin-bottom: 25px; line-height: 1.5;
    }
    .login-error-msg {
        margin-top: 15px; font-weight: bold; color: #c62828; min-height: 24px; font-size: 15px;
    }

    .main-wrapper {
      width: 1200px; max-width: 95%; margin: 0 auto;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.08);
      padding: 24px 24px 32px;
      /* 底部預留安全區 */
      padding-bottom: max(32px, env(safe-area-inset-bottom));
      position: relative;
    }
    h1 {
      font-size: 55px; text-align: center; margin: 10px 0 16px;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #1565c0, #42a5f5);
      -webkit-background-clip: text; background-clip: text;
      color: transparent; font-weight: 900;
    }
    .logout-btn {
      position: absolute; right: 20px; top: 20px;
      background: #c62828; color: white; border: none; padding: 6px 12px;
      border-radius: 8px; font-size: 14px; cursor: pointer; transition: 0.2s;
    }
    .logout-btn:hover { opacity: 0.8; }

    /* 掃描區塊佈局 */
    .scanner-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      grid-template-areas: "video side";
      gap: 24px; align-items: start; margin-top: 10px;
    }
    .video-wrap {
      grid-area: video; position: relative;
      background: #000; border-radius: 12px; overflow: hidden;
      min-height: 320px; aspect-ratio: 16 / 9;
    }
    video { width: 100%; height: 100%; display: block; object-fit: cover; }
    
    /* 瞄準框 */
    .reticle {
      position: absolute; inset: 0; pointer-events: none;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
    }
    .reticle::before, .reticle::after {
      content: ""; position: absolute; width: 80px; height: 80px; border: 4px solid #00e676;
    }
    .reticle::before { top: 16px; left: 16px; border-right: none; border-bottom: none; }
    .reticle::after  { right: 16px; bottom: 16px; border-left: none; border-top: none; }

    /* 右側操作面板 */
    .side-panel {
      grid-area: side; background: #fafafa;
      border: 1px solid #eee; border-radius: 12px; padding: 18px; align-self: start;
    }
    .field-label { font-size: 18px; color: #555; margin-bottom: 8px; }
    .scan-input {
      width: 90%; font-size: 26px; padding: 10px 12px;
      border: 2px solid #cfd8dc; border-radius: 10px; outline: none; background: #fff;
    }
    .scan-input:focus {
      border-color: #42a5f5; box-shadow: 0 0 0 4px rgba(66,165,245,0.15);
    }

    /* 按鈕群組 */
    .btn-row {
      display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; justify-content: center;
    }
    .btn {
      min-width: 120px; padding: 8px 12px; font-size: 20px;
      border: none; border-radius: 12px; cursor: pointer; color: #fff;
      transition: transform .05s ease, box-shadow .2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .btn-green { background: #2e7d32; }
    .btn-red { background: #c62828; }
    .btn-blue { background: #1565c0; }
    .btn-yellow { background: #fbc02d; color: #000; }
    .btn-pink { background: #ec407a; }
    .btn-purple { background: #8e24aa; }
    .btn-nowrap{ white-space: nowrap; }

    /* 狀態顯示 */
    .status-row {
      display: flex; gap: 12px; align-items: center; margin-top: 12px;
      color: #666; font-size: 14px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #c62828; }
    .dot.on { background: #2e7d32; }

    /* 浮動提示 Toast */
    .toast {
      position: fixed; left: 50%; top: 60%; transform: translate(-50%, -50%);
      padding: 12px 18px; font-size: 26px; color: #fff; border-radius: 16px;
      z-index: 9999; opacity: 0; pointer-events: none;
      animation: fadeInOut 3s ease forwards; white-space: nowrap;
    }
    .toast.success { background: #2e7d32; }
    .toast.error   { background: #c62828; }
    .toast.info { background: #1565c0; }
    @keyframes fadeInOut {
      0%{ opacity:0; transform:translate(-50%, -6px); }
      10%{ opacity:1; transform:translate(-50%, 0); }
      80%{ opacity:1; }
      100%{ opacity:0; transform:translate(-50%, -6px); }
    }

    /* 統計卡片 */
    .stats-card{
      margin-top: 16px; background: #ffffff; border: 1px solid #e3f2fd;
      border-radius: 12px; padding: 14px; box-shadow: 0 6px 18px rgba(13,71,161,0.06);
    }
    .stats-title{
      font-size: 28px; font-weight: 800; color: #0d47a1;
      margin: 4px 4px 10px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
    }
    .stats-wrap{ overflow-x: auto; }
    .stats-table{ width: 100%; border-collapse: collapse; font-size: 26px; }
    .stats-table thead th{
      background: linear-gradient(90deg,#1565c0,#42a5f5);
      color:#fff; font-weight:700; padding: 10px 12px; text-align:center;
    }
    .stats-table td{ border: 1px solid #e0e0e0; padding: 10px 12px; text-align:center; }
    
    /* 查詢結果卡片 */
    .result-card{
      margin-top: 16px; background: #fffde7; border: 1px solid #ffe082;
      border-radius: 12px; padding: 14px; box-shadow: 0 6px 18px rgba(255,193,7,0.12);
    }
    .result-title{
      font-size: 28px; font-weight: 800; color: #f57f17;
      margin: 4px 4px 10px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
    }
    .result-wrap{ overflow-x:auto; }
    .result-table{
      width: 100%; border-collapse: collapse; font-size: 20px; table-layout: fixed;
    }
    .result-table thead th{
      background: linear-gradient(90deg,#fbc02d,#ffd54f);
      color:#3e2723; font-weight:800; padding: 10px 12px; text-align:center; font-size: 24px;
    }
    .result-table td{
      border: 1px solid #ffe082; padding: 10px 12px;
      text-align: center; vertical-align: middle;
      word-break: break-word; white-space: normal;
    }

    /* Modal 共用設定 */
    .modal-backdrop{
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      display: none; align-items: center; justify-content: center; z-index: 10050;
    }
    .modal{
      width: 92%; max-width: 500px; background: #fff; border-radius: 16px;
      box-shadow: 0 12px 36px rgba(0,0,0,.2); padding: 24px;
      display: flex; flex-direction: column; max-height: 85vh;
    }
    .modal h3{ margin: 0 0 15px 0; font-size: 24px; font-weight: bold; }
    
    /* 結案密碼 Modal 特殊設定 */
    #closeTitle { color:#c2185b; }
    #closeModal input[type="password"]{
      width: 100%; font-size: 22px; padding: 10px 12px;
      border: 2px solid #ffb6c1; border-radius: 10px; outline: none; margin-bottom: 15px; box-sizing: border-box;
    }

    /* 帳號管理 Modal 特殊設定 */
    #accountTitle { color: #8e24aa; }
    .account-input-group { display: flex; gap: 8px; margin-bottom: 15px; flex-shrink: 0;}
    .account-input-group input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; outline: none; }
    .account-list { overflow-y: auto; flex: 1; border: 1px solid #eee; border-radius: 8px; background: #fafafa; padding: 10px; margin-bottom: 15px; }
    .account-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #ddd; gap: 8px; }
    .account-email { flex: 1; font-size: 16px; color: #333; word-break: break-all;}
    .account-item button { padding: 6px 12px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; color: white;}
    .acc-btn-edit { background: #fbc02d; color: black; }
    .acc-btn-del { background: #c62828; }
    .acc-btn-save { background: #2e7d32; }

    /* 手機版適應 */
    @media (max-width: 1200px) {
      h1 { font-size: 30px; }
      .scanner-box { grid-template-columns: 1fr; grid-template-areas: "video" "side"; }
      .side-panel { margin-top: 10px; }
      .btn { font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen">
    <div class="login-box">
        <h1>設備盤點系統</h1>
        <p>請使用 Google 帳號登入<br><small>(需授權)</small></p>
        <div id="g_id_onload"
             data-client_id="553016940521-araovlp30ctbqn6um5rr49q3es5jm4jg.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div style="display: flex; justify-content: center;">
            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="center"></div>
        </div>
        <div id="login-msg" class="login-error-msg"></div>
    </div>
</div>

<!-- 系統主畫面 -->
<div class="main-wrapper" id="main-app" style="display: none;">
  <div class="container">
    <h1>鳳甲國中設備盤點</h1>
    <button class="logout-btn" onclick="logout()">登出</button>

    <div class="scanner-box">
      <div class="video-wrap">
        <video id="video" playsinline autoplay muted></video>
        <div class="reticle"></div>
      </div>

      <div class="side-panel">
        <div class="field-label">掃描結果輸入</div>
        <input id="scanResult" class="scan-input" maxlength="12" placeholder="等待掃描或手動輸入..." />

        <div class="btn-row">
          <button class="btn btn-blue" id="btnQuery">🔎 查詢</button>
          <button class="btn btn-red" id="btnClear">🧹 清除</button>
          <button class="btn btn-yellow" id="btnSheet">📄 工作表</button>
          <button class="btn btn-pink" id="btnClose">🎀 結案</button>
          <button class="btn btn-purple" id="btnAccount">👥 帳號管理</button>
          <button class="btn btn-green btn-nowrap" id="btnCatalog" style="width: 100%;">📗 設備清冊查詢</button>
          <button class="btn btn-blue" id="btnStartCamera" style="display:none; width: 100%;">📷 重啟相機</button>
        </div>
      </div>

      <div class="status-row">
        <div id="camDot" class="dot"></div>
        <div><b>相機</b>：<span id="camStatus">初始化中…</span></div>
      </div>
    </div>
  </div>

  <section id="resultCard" class="result-card" style="display:none;">
    <div class="result-title">查詢結果</div>
    <div class="result-wrap">
      <table id="resultTable" class="result-table">
        <thead>
          <tr>
            <th>編號</th> <th>名稱</th> <th>總價</th> <th>年限</th> <th>條碼</th> <th>比對</th> <th>狀態</th> <th>處理</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</div>

<!-- 結案 Modal -->
<div id="closeModal" class="modal-backdrop">
  <div class="modal">
    <h3 id="closeTitle">結案確認</h3>
    <p>請輸入密碼以確認：</p>
    <input id="closePwd" type="password" inputmode="numeric" placeholder="請輸入密碼" />
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button class="btn btn-grey" id="btnCloseCancel">取消</button>
      <button class="btn btn-pink" id="btnCloseOk">確定結案</button>
    </div>
  </div>
</div>

<!-- 帳號管理 Modal -->
<div id="accountModal" class="modal-backdrop">
  <div class="modal">
    <h3 id="accountTitle">白名單帳號管理</h3>
    <div class="account-input-group">
        <input type="text" id="newAccountEmail" placeholder="輸入 Google 帳號 (Email)">
        <button class="btn btn-green" id="btnAddAccount" style="min-width: 80px;">新增</button>
    </div>
    <div class="account-list" id="accountListContainer">載入中...</div>
    <button class="btn btn-grey" id="btnAccountClose" style="width: 100%;">關閉</button>
  </div>
</div>

<script>
// 使用您提供的部署 ID
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbz9Il_sTz9LeC-eq3rWmP21FxmrpOlx0JFOLl8H--y5JWJQF4YEESjqUqk0V5QFLNGiXA/exec'; 

async function callGasApi(action, params = {}) {
  try {
    const response = await fetch(GAS_API_URL, {
      method: "POST",
      body: JSON.stringify({ action, params })
    });
    return await response.json();
  } catch (e) {
    console.error("API Error:", e);
    throw e;
  }
}

// 登入邏輯
function decodeJwtResponse(token) {
    let base64Url = token.split('.')[1];
    let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    let jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    return JSON.parse(jsonPayload);
}

async function handleCredentialResponse(response) {
    const payload = decodeJwtResponse(response.credential);
    if (payload && payload.email) {
        document.getElementById('login-msg').textContent = "驗證中...";
        try {
            const data = await callGasApi('verifyLogin', { email: payload.email });
            if (data.status === 'success' && data.authorized) {
                localStorage.setItem('authEmailInventoryApp', payload.email);
                startApp(payload.email);
            } else {
                document.getElementById('login-msg').textContent = "❌ 帳號不在白名單中";
            }
        } catch (err) {
            document.getElementById('login-msg').textContent = "連線失敗，請稍後再試";
        }
    }
}

function checkLoginStatus() {
    const savedEmail = localStorage.getItem('authEmailInventoryApp');
    if (savedEmail) {
        startApp(savedEmail);
        callGasApi('verifyLogin', { email: savedEmail }).then(data => {
            if (data.status === 'success' && !data.authorized) logout();
        });
    }
}

function logout() {
    localStorage.removeItem('authEmailInventoryApp');
    location.reload();
}

function startApp(email) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    startScanner();
    scanInput.focus();
}

// 相機控制邏輯 (修正 Requested device not found)
let reader = null;
let scanning = false;
const videoEl = document.getElementById('video');
const scanInput = document.getElementById('scanResult');
const camStatus = document.getElementById('camStatus');
const camDot = document.getElementById('camDot');

async function startScanner() {
  try {
    if (!reader) reader = new ZXing.BrowserMultiFormatReader();
    const constraintsSequence = [
      { video: { facingMode: { exact: "environment" } } },
      { video: { facingMode: { ideal: "environment" } } },
      { video: true }
    ];

    let success = false;
    for (const constraints of constraintsSequence) {
      try {
        await reader.decodeFromConstraints(constraints, videoEl, (result) => {
          if (result) {
            scanInput.value = result.getText();
            reader.reset();
            runQuery(result.getText());
          }
        });
        success = true;
        break; 
      } catch (err) { continue; }
    }

    if (success) {
      scanning = true;
      camDot.classList.add('on');
      camStatus.textContent = '掃描中…';
    }
  } catch (e) {
    camStatus.textContent = '相機啟動失敗';
  }
}

function runQuery(code) {
  if (!code) return;
  document.getElementById('resultCard').style.display = 'none';
  callGasApi('searchAssets', { J: code }).then(res => {
    if (res.rows && res.rows.length > 0) {
      const row = res.rows[0];
      const tbody = document.querySelector('#resultTable tbody');
      tbody.innerHTML = `<tr>
        <td>${row.A}</td><td>${row.B}</td><td>${row.F}</td><td>${row.H}</td><td>${row.J}</td><td>${row.K}</td><td>${row.L}</td>
        <td><button class="btn btn-green" onclick="markDiscard('${row.J}')">報廢</button></td>
      </tr>`;
      document.getElementById('resultCard').style.display = 'block';
      scanInput.value = '';
    } else {
      alert("查無資料");
    }
  });
}

async function markDiscard(barcode) {
    if(!confirm("確定要執行擬報廢上傳嗎？")) return;
    const res = await callGasApi('markDiscard', { barcode });
    if(res.ok) {
        alert("上傳成功");
        runQuery(barcode);
    }
}

// 帳號管理
const accountModal = document.getElementById('accountModal');
document.getElementById('btnAccount').onclick = () => {
    accountModal.style.display = 'flex';
    loadAccounts();
};
document.getElementById('btnAccountClose').onclick = () => accountModal.style.display = 'none';

async function loadAccounts() {
    const res = await callGasApi('getWhitelist');
    const container = document.getElementById('accountListContainer');
    container.innerHTML = '';
    res.data.forEach(email => {
        const div = document.createElement('div');
        div.className = 'account-item';
        div.innerHTML = `<span class="account-email">${email}</span>
            <button class="acc-btn-del" onclick="deleteAccount('${email}')">刪除</button>`;
        container.appendChild(div);
    });
}

async function addAccount() {
    const email = document.getElementById('newAccountEmail').value;
    const res = await callGasApi('addWhitelist', { email });
    if(res.status === 'success') loadAccounts();
}
document.getElementById('btnAddAccount').onclick = addAccount;

async function deleteAccount(email) {
    if(confirm(`確定刪除 ${email}?`)) {
        await callGasApi('deleteWhitelist', { email });
        loadAccounts();
    }
}

// 其他按鈕
document.getElementById('btnClear').onclick = () => { scanInput.value = ''; startScanner(); };
document.getElementById('btnSheet').onclick = () => window.open('https://docs.google.com/spreadsheets/d/11KTGQY5DhUbPBTzFGGrGFhUHZoMa4FfKOYAQHq2P0Wo/edit?gid=68255210#gid=68255210', '_blank');
document.getElementById('btnCatalog').onclick = () => window.open('https://mikania0000.github.io/Equ-query/', '_blank');
document.getElementById('btnQuery').onclick = () => runQuery(scanInput.value);

window.onload = checkLoginStatus;
</script>
</body>
</html>
