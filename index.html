<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <!-- 支援 iPhone 瀏海安全區與響應式縮放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>鳳甲國中設備盤點</title>

  <!-- ZXing 條碼/QR 掃描庫 -->
  <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
  <!-- 🆕 引入 Google Sign-In API -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* ========== CSS 樣式區域 ========== */
    body {
      font-family: "微軟正黑體", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #f7f7f7;
      margin: 0; padding: 30px 0;
    }
    
    /* 🆕 登入畫面樣式 */
    #login-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #f7f7f7; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .login-box {
        background: white; padding: 40px; border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
        width: 90%; max-width: 400px; border: 2px solid #e0e0e0;
    }
    .login-box h1 {
        font-size: 32px; color: #1565c0; margin: 0 0 10px 0; background: none; -webkit-text-fill-color: initial;
    }
    .login-box p {
        font-size: 16px; color: #666; margin-bottom: 25px; line-height: 1.5;
    }
    .login-error-msg {
        margin-top: 15px; font-weight: bold; color: #c62828; min-height: 24px; font-size: 15px;
    }

    .main-wrapper {
      width: 1200px; max-width: 95%; margin: 0 auto;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.08);
      padding: 24px 24px 32px;
      /* 底部預留安全區 */
      padding-bottom: max(32px, env(safe-area-inset-bottom));
      position: relative;
    }
    h1 {
      font-size: 55px; text-align: center; margin: 10px 0 16px;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #1565c0, #42a5f5);
      -webkit-background-clip: text; background-clip: text;
      color: transparent; font-weight: 900;
    }
    .logout-btn {
      position: absolute; right: 20px; top: 20px;
      background: #c62828; color: white; border: none; padding: 6px 12px;
      border-radius: 8px; font-size: 14px; cursor: pointer; transition: 0.2s;
    }
    .logout-btn:hover { opacity: 0.8; }

    /* 掃描區塊佈局 */
    .scanner-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      grid-template-areas: "video side";
      gap: 24px; align-items: start; margin-top: 10px;
    }
    .video-wrap {
      grid-area: video; position: relative;
      background: #000; border-radius: 12px; overflow: hidden;
      min-height: 320px; aspect-ratio: 16 / 9;
    }
    video { width: 100%; height: 100%; display: block; object-fit: cover; }
    
    /* 瞄準框 */
    .reticle {
      position: absolute; inset: 0; pointer-events: none;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
    }
    .reticle::before, .reticle::after {
      content: ""; position: absolute; width: 80px; height: 80px; border: 4px solid #00e676;
    }
    .reticle::before { top: 16px; left: 16px; border-right: none; border-bottom: none; }
    .reticle::after  { right: 16px; bottom: 16px; border-left: none; border-top: none; }

    /* 右側操作面板 */
    .side-panel {
      grid-area: side; background: #fafafa;
      border: 1px solid #eee; border-radius: 12px; padding: 18px; align-self: start;
    }
    .field-label { font-size: 18px; color: #555; margin-bottom: 8px; }
    .scan-input {
      width: 90%; font-size: 26px; padding: 10px 12px;
      border: 2px solid #cfd8dc; border-radius: 10px; outline: none; background: #fff;
    }
    .scan-input:focus {
      border-color: #42a5f5; box-shadow: 0 0 0 4px rgba(66,165,245,0.15);
    }

    /* 按鈕群組 */
    .btn-row {
      display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; justify-content: center;
    }
    .btn {
      min-width: 120px; padding: 8px 12px; font-size: 20px;
      border: none; border-radius: 12px; cursor: pointer; color: #fff;
      transition: transform .05s ease, box-shadow .2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .btn:active { transform: translateY(1px); }
    .btn-green { background: #2e7d32; }
    .btn-green:hover { box-shadow: 0 6px 16px rgba(46,125,50,0.35); }
    .btn-red { background: #c62828; }
    .btn-red:hover { box-shadow: 0 6px 16px rgba(198,40,40,0.35); }
    .btn-blue { background: #1565c0; }
    .btn-blue:hover { box-shadow: 0 6px 16px rgba(21,101,192,0.35); }
    .btn-yellow { background: #fbc02d; color: #000; }
    .btn-yellow:hover { box-shadow: 0 6px 16px rgba(251,192,45,0.35); }
    .btn-pink { background: #ec407a; }
    .btn-pink:hover { box-shadow: 0 6px 16px rgba(236,64,122,0.35); }
    .btn-purple { background: #8e24aa; }
    .btn-purple:hover { box-shadow: 0 6px 16px rgba(142,36,170,0.35); }
    .btn-nowrap{ white-space: nowrap; }

    /* 狀態顯示 */
    .status-row {
      display: flex; gap: 12px; align-items: center; margin-top: 12px;
      color: #666; font-size: 14px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #c62828; }
    .dot.on { background: #2e7d32; }

    /* 浮動提示 Toast */
    .toast {
      position: fixed; left: 50%; top: 60%; transform: translate(-50%, -50%);
      padding: 12px 18px; font-size: 26px; color: #fff; border-radius: 16px;
      z-index: 9999; opacity: 0; pointer-events: none;
      animation: fadeInOut 3s ease forwards; white-space: nowrap;
    }
    .toast.success { background: #2e7d32; }
    .toast.error   { background: #c62828; }
    .toast.info { background: #1565c0; }
    @keyframes fadeInOut {
      0%{ opacity:0; transform:translate(-50%, -6px); }
      10%{ opacity:1; transform:translate(-50%, 0); }
      80%{ opacity:1; }
      100%{ opacity:0; transform:translate(-50%, -6px); }
    }

    /* 手機版適應 */
    @media (max-width: 1200px) {
      body { padding: 18px 0; }
      .main-wrapper { max-width: 100%; padding: 0 10px; }
      .container { padding: 16px; border-radius: 12px; }
      h1 { font-size: 30px; letter-spacing: 1px; }
      .scanner-box {
        grid-template-columns:1fr;
        grid-template-areas: "video" "side"; gap: 12px;
      }
      .video-wrap { min-height: 220px; aspect-ratio: 4 / 3; }
      .reticle::before, .reticle::after { width: 56px; height: 56px; border-width: 3px; }
      .side-panel { padding: 12px; margin-top: 6px; }
      .field-label { font-size: 16px; }
      .scan-input { font-size: 22px; padding: 10px; }
      .btn { font-size: 18px; padding: 12px 14px; }
      .status-row { font-size: 13px; }
      .toast { top: 12%; font-size: 22px; }
    }

    /* 統計卡片 */
    .stats-card{
      margin-top: 16px; background: #ffffff; border: 1px solid #e3f2fd;
      border-radius: 12px; padding: 14px; box-shadow: 0 6px 18px rgba(13,71,161,0.06);
    }
    .stats-title{
      font-size: 28px; font-weight: 800; color: #0d47a1;
      margin: 4px 4px 10px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
    }
    .stats-title::before{
      content:""; width: 10px; height: 10px; border-radius: 50%; background:#42a5f5;
    }
    .stats-wrap{ overflow-x: auto; }
    .stats-table{ width: 100%; border-collapse: collapse; font-size: 26px; }
    .stats-table thead th{
      background: linear-gradient(90deg,#1565c0,#42a5f5);
      color:#fff; font-weight:700; padding: 10px 12px; text-align:center;
    }
    .stats-table td{ border: 1px solid #e0e0e0; padding: 10px 12px; text-align:center; }
    .stats-table tbody tr:nth-child(odd){ background:#fafafa; }
    #statsEmpty{ font-size: 16px; color:#888; padding: 10px 4px; text-align:center; }
    
    /* 報廢標籤 */
    .status-discard {
      background-color: #d32f2f; color: #fff; font-weight: bold;
      padding: 4px 8px; border-radius: 6px; display: inline-block;
    }

    /* 查詢結果卡片 */
    .result-card{
      margin-top: 16px; background: #fffde7; border: 1px solid #ffe082;
      border-radius: 12px; padding: 14px; box-shadow: 0 6px 18px rgba(255,193,7,0.12);
    }
    .result-title{
      font-size: 28px; font-weight: 800; color: #f57f17;
      margin: 4px 4px 10px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
    }
    .result-title::before{
      content:""; width: 10px; height: 10px; border-radius: 50%; background:#ffca28;
    }
    .result-wrap{ overflow-x:auto; }
    .result-table{
      width: 100%; border-collapse: collapse; font-size: 20px; table-layout: fixed;
    }
    .result-table thead th{
      background: linear-gradient(90deg,#fbc02d,#ffd54f);
      color:#3e2723; font-weight:800; padding: 10px 12px; text-align:center; font-size: 24px;
    }
    .result-table td{
      border: 1px solid #ffe082; padding: 10px 12px;
      text-align: center; vertical-align: middle;
      word-break: break-word; white-space: normal;
    }

    /* 處理中遮罩與文字 */
    .progress-toast{
      position: fixed; left: 50%; top: 18%; transform: translateX(-50%);
      min-width: 320px; background: #0d47a1; color: #fff; border-radius: 16px;
      padding: 14px 18px; z-index: 10000; box-shadow: 0 10px 24px rgba(0,0,0,.18);
      text-align: center; white-space: nowrap;
    }
    .progress-msg{ font-size: 26px; line-height: 1.25; }
    @media (max-width: 900px){
      .progress-msg{ font-size: 22px; }
      .stats-card{ padding: 12px; }
      .stats-title{ font-size: 26px; }
      .stats-table{ font-size: 24px; }
    }

    /* Modal 共用設定 */
    .modal-backdrop{
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      display: none; align-items: center; justify-content: center; z-index: 10050;
    }
    .modal{
      width: 92%; max-width: 420px; background: #fff; border-radius: 16px;
      box-shadow: 0 12px 36px rgba(0,0,0,.2); padding: 20px;
    }
    .modal h3{ margin: 0 0 10px 0; font-size: 24px; color:#c2185b; font-weight: 900; }
    .modal p{ margin: 6px 0 14px; color:#555; font-size: 16px; }
    .modal .row{ display:flex; gap:10px; align-items:center; }
    .modal input[type="password"]{
      flex:1; font-size: 22px; padding: 10px 12px;
      border: 2px solid #ffb6c1; border-radius: 10px; outline: none;
    }
    .modal input[type="password"]:focus{ border-color:#ec407a; box-shadow: 0 0 0 4px rgba(236,64,122,.15); }
    .modal .btn{ min-width: 110px; }
    .modal .btn-grey{ background:#90a4ae; }
    .modal .btn-grey:hover{ box-shadow:0 6px 16px rgba(144,164,174,.35); }

    /* 帳號管理 Modal 特殊設定 */
    #accountModal .modal { max-width: 500px; display: flex; flex-direction: column; max-height: 85vh; }
    #accountTitle { color: #8e24aa; }
    .account-input-group { display: flex; gap: 8px; margin-bottom: 15px; flex-shrink: 0;}
    .account-input-group input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; outline: none; }
    .account-input-group input:focus { border-color: #8e24aa; }
    .account-list { overflow-y: auto; flex: 1; border: 1px solid #eee; border-radius: 8px; background: #fafafa; padding: 10px; margin-bottom: 15px; }
    .account-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #ddd; gap: 8px; }
    .account-item:last-child { border-bottom: none; }
    .account-email { flex: 1; font-size: 16px; color: #333; word-break: break-all;}
    .account-item button { padding: 6px 12px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; color: white;}
    .acc-btn-edit { background: #fbc02d; color: black; }
    .acc-btn-del { background: #c62828; }
    .acc-btn-save { background: #2e7d32; }
  </style>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen">
    <div class="login-box">
        <h1>設備盤點系統</h1>
        <p>請使用 Google 帳號登入<br><small>(需管理員白名單授權)</small></p>
        
        <div id="g_id_onload"
             data-client_id="553016940521-araovlp30ctbqn6um5rr49q3es5jm4jg.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        
        <div style="display: flex; justify-content: center;">
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="center">
            </div>
        </div>
        
        <div id="login-msg" class="login-error-msg"></div>
    </div>
</div>

<!-- 系統主畫面 -->
<div class="main-wrapper" id="main-app" style="display: none;">
  <div class="container">
    <h1>鳳甲國中設備盤點</h1>
    <button class="logout-btn" onclick="logout()">登出</button>

    <div class="scanner-box">
      <!-- 左側：相機預覽 -->
      <div class="video-wrap">
        <video id="video" playsinline webkit-playsinline autoplay muted></video>
        <div class="reticle"></div>
      </div>

      <!-- 右側：結果輸入 + 按鈕 -->
      <div class="side-panel">
        <div class="field-label">掃描結果輸入</div>
        <div style="display: flex; align-items: center; gap: 8px;">
          <!-- ✅ maxlength="12" 限制輸入長度 -->
          <input id="scanResult" class="scan-input" maxlength="12" placeholder="等待掃描或手動輸入..." style="flex:1;" />
        </div>

        <div class="btn-row" style="margin-top:12px;">
          <button class="btn btn-blue" id="btnQuery">🔎 查詢</button>
          <button class="btn btn-red" id="btnClear">🧹 清除</button>
          <button class="btn btn-yellow" id="btnSheet" >📄 工作表</button>
          <button class="btn btn-pink" id="btnClose">🎀 結案</button>
          <!-- 帳號管理按鈕 -->
          <button class="btn btn-purple" id="btnAccount">👥 帳號管理</button>
          <button class="btn btn-green btn-nowrap" id="btnCatalog" style="width: 100%;">📗 設備清冊查詢</button>
          <button class="btn btn-blue" id="btnStartCamera" style="display:none; width: 100%;">📷 重啟相機</button>
        </div>
      </div>

      <div class="status-row">
        <div id="camDot" class="dot"></div>
        <div><b>相機</b>：<span id="camStatus">初始化中…</span></div>
        <div style="margin-left:auto;">每 4 秒健康檢查</div>
      </div>
    </div>
  </div>

  <!-- 查詢結果區 -->
  <section id="resultCard" class="result-card" style="display:none;">
    <div class="result-title">查詢結果</div>
    <div class="result-wrap">
      <table id="resultTable" class="result-table" aria-label="查詢結果">
        <colgroup>
          <col style="width: 14%;"> <col style="width: 18%;"> <col style="width: 9%;">
          <col style="width: 13%;"> <col style="width: 16%;"> <col style="width: 8%;">
          <col style="width: 12%;"> <col style="width: 12%;">
        </colgroup>
        <thead>
          <tr>
            <th>編號</th> <th>名稱</th> <th>總價</th> <th>年限</th>
            <th>條碼</th> <th>比對</th> <th>狀態</th> <th>處理</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <!-- 盤點統計表 -->
  <section class="stats-card" id="statsCard">
    <div class="stats-title">盤點統計表</div>
    <div class="stats-wrap">
      <table id="statsTable" class="stats-table" aria-label="盤點統計表" style="display:none;">
        <thead>
          <tr><th>項目</th><th>數量</th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="statsEmpty">— 讀取中… —</div>
    </div>
  </section>
</div>

<!-- 結案密碼 Modal -->
<div id="closeModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="closeTitle">
    <h3 id="closeTitle">結案確認</h3>
    <p>此操作將清空盤點全部資料。請輸入密碼以確認：</p>
    <div class="row" style="margin-bottom:12px;">
      <input id="closePwd" type="password" inputmode="numeric" autocomplete="off" placeholder="請輸入密碼" />
    </div>
    <div class="row" style="justify-content:flex-end;">
      <button class="btn btn-grey" id="btnCloseCancel">取消</button>
      <button class="btn btn-pink" id="btnCloseOk">確定結案</button>
    </div>
  </div>
</div>

<!-- 帳號管理 Modal -->
<div id="accountModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="accountTitle">
    <h3 id="accountTitle">白名單帳號管理</h3>
    
    <div class="account-input-group">
        <input type="text" id="newAccountEmail" placeholder="輸入新增的 Google 帳號 (Email)">
        <button class="btn btn-green" id="btnAddAccount" style="min-width: 80px; font-size: 16px; padding: 8px;">新增</button>
    </div>

    <div class="account-list" id="accountListContainer">
        <div style="text-align: center; color: #888; padding: 20px;">載入中...</div>
    </div>

    <div style="display:flex; justify-content:flex-end;">
      <button class="btn btn-grey" id="btnAccountClose" style="width: 100%;">關閉</button>
    </div>
  </div>
</div>

<script>
// ==========================================
// 🔴 重要：請務必填入您的 Google Apps Script 部署 URL
// ==========================================
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxBnPl_7XPedBwlk4pL3jYHwXteRd2SNegY24QLp6jGVvxCQDgRTXTu1XhF2rcaGh_mIw/exec'; 

// 通用 API 呼叫函式
async function callGasApi(action, params = {}) {
  if (GAS_API_URL.includes('你的部署ID') || !GAS_API_URL.startsWith('http')) {
    throw new Error('GAS_URL_NOT_SET');
  }

  const payload = { action, ...params };
  try {
    const response = await fetch(GAS_API_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });
    
    if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
    }

    const json = await response.json();
    return json;
  } catch (e) {
    console.error("API Error Details:", e);
    throw e;
  }
}

// ------------------------------------------------
// 登入與記憶功能
// ------------------------------------------------
function decodeJwtResponse(token) {
    try {
        let base64Url = token.split('.')[1];
        let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    } catch (e) {
        return null;
    }
}

async function handleCredentialResponse(response) {
    const payload = decodeJwtResponse(response.credential);
    if (payload && payload.email) {
        const msgEl = document.getElementById('login-msg');
        msgEl.textContent = "驗證白名單授權中...";
        msgEl.style.color = "#1565c0";
        try {
            const data = await callGasApi('verifyLogin', { email: payload.email });
            
            if (data.status === 'success') {
                if (data.authorized) {
                    localStorage.setItem('authEmailInventoryApp', payload.email);
                    startApp(payload.email);
                } else {
                    msgEl.textContent = `❌ 帳號 ${payload.email} 無訪問權限`;
                    msgEl.style.color = "#c62828";
                    localStorage.removeItem('authEmailInventoryApp');
                }
            } else {
                msgEl.textContent = `⚠️ 系統錯誤: ${data.message}`;
                msgEl.style.color = "#c62828";
            }
        } catch (err) {
            msgEl.textContent = "連線驗證失敗，請檢查網路狀態或確認已部署新版本";
            msgEl.style.color = "#c62828";
        }
    }
}

function checkLoginStatus() {
    const savedEmail = localStorage.getItem('authEmailInventoryApp');
    if (savedEmail) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        
        callGasApi('verifyLogin', { email: savedEmail })
        .then(data => {
            if (data.status === 'success' && !data.authorized) {
                alert("您的授權已被取消，請重新登入！");
                logout();
            } else if (data.status === 'error') {
                console.error("背景驗證錯誤:", data.message);
            }
        }).catch(e => console.log('背景驗證中斷'));

        startApp(savedEmail);
    } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('main-app').style.display = 'none';
    }
}

function logout() {
    localStorage.removeItem('authEmailInventoryApp');
    location.reload();
}

function startApp(email) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    
    showToast(`歡迎回來，${email}`, 'success');

async function loadAccounts() {

// 浮動提示顯示
function showToast(msg, type = 'success', ms = 3000) {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), ms);
}

// 查詢進度條 (模擬)
let _progressEl = null, _progressTimer = null, _progressPct = 0;
function _ensureProgressEl(){
  if (_progressEl) return _progressEl;
  const box = document.createElement('div');
  box.className = 'progress-toast';
  box.innerHTML = `<div class="progress-msg" id="progressText">查詢中…請稍後 0%</div>`;
  document.body.appendChild(box);
  _progressEl = box;
  return _progressEl;
}
function _setProgress(p){
  const el = _ensureProgressEl().querySelector('#progressText');
  if (el) el.textContent = `查詢中…請稍後 ${p}%`;
}
function showProgress(startPct = 0){
  _ensureProgressEl();
  _progressPct = Math.max(0, Math.min(100, startPct|0));
  _setProgress(_progressPct);
  _progressEl.style.display = 'block';
  if (_progressTimer) clearInterval(_progressTimer);
  _progressTimer = setInterval(() => {
    if (_progressPct >= 90) return;
    const step = Math.floor(Math.random() * 3) + 2;
    _progressPct = Math.min(90, _progressPct + step);
    _setProgress(_progressPct);
  }, 180);
}
function finishProgress(success = true){
  if (_progressTimer) { clearInterval(_progressTimer); _progressTimer = null; }
  if (!_progressEl) return;
  _progressPct = 100;
  _setProgress(_progressPct);
  setTimeout(() => { _progressEl.style.display = 'none'; }, 500);
}
function hideProgressNow(){
  if (_progressTimer) { clearInterval(_progressTimer); _progressTimer = null; }
  if (_progressEl) _progressEl.style.display = 'none';
}

// 相機邏輯
let scanStartedAt = 0;
let cooling = false;

async function startScanner(fromUserGesture = false) {
  // 如果已經確定沒有相機，且不是使用者手動觸發，就直接返回
  if (noCameraAvailable && !fromUserGesture) return;
  
  // 如果是使用者手動觸發，重置標記再試一次
  if (fromUserGesture) noCameraAvailable = false;

  try {
    if (!navigator.mediaDevices) {
        throw new Error('Browser not support mediaDevices');
    }

    if (!reader) reader = new ZXing.BrowserMultiFormatReader();
    
    // ✅ 修正：提升掃描靈敏度，大幅縮短解碼間隔
    const scanInterval = isIOS ? 100 : 30; // 30ms 極速模式 (原 250ms)
    if ('timeBetweenDecodingAttempts' in reader) {
      reader.timeBetweenDecodingAttempts = scanInterval;
    } else if ('timeBetweenScansMillis' in reader) {
      reader.timeBetweenScansMillis = scanInterval;
    }

    // 嘗試啟動相機：優先使用 environment (後鏡頭)
    try {
        const constraints = {
            audio: false,
            video: {
                facingMode: { ideal: 'environment' },
                width:  { ideal: 1280 },
                height: { ideal: 720  }
            }
        };
        await reader.decodeFromConstraints(constraints, videoEl, onDecodeResult);
    } catch (envError) {
        console.warn('後鏡頭啟動失敗，嘗試使用任意鏡頭...', envError);
        // 降級嘗試：不指定 facingMode，讓瀏覽器選預設鏡頭 (解決電腦版錯誤)
        await reader.decodeFromConstraints({ video: true }, videoEl, onDecodeResult);
    }

    if (btnStartCamera) btnStartCamera.style.display = 'none';

  } catch (e) {
    console.error('Camera Error:', e);
    scanning = false;
    scanStartedAt = 0;
    camStatus.textContent = '相機啟動失敗';
    camDot.classList.remove('on');

    // 捕捉 NotFoundError 並設置標記，顯示按鈕
    if (e.name === 'NotFoundError' || e.name === 'DevicesNotFoundError' || e.message.includes('No video input devices found')) {
         noCameraAvailable = true; 
         camStatus.textContent = '找不到攝影機';
         
         // 強制顯示重啟相機按鈕
         if (btnStartCamera) {
             btnStartCamera.style.display = 'inline-block';
             btnStartCamera.textContent = '📷 重啟相機';
         }

         // 靜音錯誤提示，除非是用戶主動點擊
         if (fromUserGesture) showToast('📷 找不到攝影機裝置', 'error');
    } else if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
         noCameraAvailable = true; 
         camStatus.textContent = '無相機權限';
         if (btnStartCamera) btnStartCamera.style.display = 'inline-block';
         showToast('⛔ 請允許使用相機', 'error');
    } else {
        // 其他錯誤也顯示按鈕，以便重試
        if (btnStartCamera) btnStartCamera.style.display = 'inline-block';
    }
  }
}

// 掃描回調函式
function onDecodeResult(result, err) {
  scanning = true;
  if (!scanStartedAt) scanStartedAt = Date.now();
  camStatus.textContent = '掃描中…';
  camDot.classList.add('on');
  if (result) {
    const text = String(result.getText() || '').trim();
    if (text) {
      scanInput.value = text;
      stopScanner();
      runQuery(text); // 掃描成功後自動查詢
    }
  }
}

// 格式化狀態 (報廢紅字)
function formatStatusHTML(s){
  const t = String(s ?? '');
  return t.includes('報廢') ? `<span class="status-discard">${t}</span>` : t;
}

// 渲染查詢結果表格
function renderResult(row) {
  const card  = document.getElementById('resultCard');
  const tbody = document.querySelector('#resultTable tbody');
  if (!tbody) return;
  
  // ✅ 修正：只有在成功渲染結果時，才清空輸入框
  scanInput.value = '';
  
  tbody.innerHTML = '';
  const tr = document.createElement('tr');
  // 對應 GAS 回傳的物件欄位 A, B, F, H, J, K, L
  const cells = [row.A, row.B, row.F, row.H, row.J, row.K, row.L];

  cells.forEach((v, idx) => {
    const td = document.createElement('td');
    if (idx === 6) td.innerHTML = formatStatusHTML(v); // 狀態欄位
    else td.textContent = v ?? '';
    tr.appendChild(td);
  });

  // 操作按鈕 (報廢)
  const tdAction   = document.createElement('td');
  const uploadBtn  = document.createElement('button');
  uploadBtn.textContent = '報廢';
  uploadBtn.className   = 'btn btn-green';
  uploadBtn.style.minWidth = '80px';
  uploadBtn.style.fontSize = '20px';
  tdAction.appendChild(uploadBtn);
  tr.appendChild(tdAction);

  // 報廢按鈕點擊事件
  uploadBtn.addEventListener('click', () => {
    const code = (row.J || '').trim();
    const matchCount = Number(row.K) || 0;
    const statusText = (row.L  || '').trim();

    if (statusText.includes('報廢')) { showToast('🛑 此設備已報廢，不用上傳', 'info', 2500); return; }
    if (matchCount >= 1) { showToast('📦 設備已上傳!', 'info', 2000); return; }
    if (!code) { showToast('⛔ 無條碼，無法上傳', 'error', 2000); return; }

    uploadBtn.disabled = true;
    uploadBtn.style.opacity = 0.7;
    showProgress(0);

    // 1. 寫入盤點表
    callGasApi('addInventoryRecord', { code: code })
      .then(res => {
        finishProgress(true);
        if (res && res.ok) {
          showToast('✅ 成功上傳', 'success', 2000);
          loadStats(); // 刷新統計
          const newStatusText = `${formatRocDate()}擬報廢`;

          // 2. 更新財產目錄狀態 -> 3. 重新查詢以更新畫面
          return callGasApi('updateAssetStatus', { code: code, statusText: newStatusText })
            .then(() => callGasApi('findAssetByBarcode', { barcode: code }))
            .then(updated => {
              if (updated && updated.found) {
                 tr.cells[5].textContent  = updated.row.K ?? '';
                 tr.cells[6].innerHTML    = formatStatusHTML(updated.row.L ?? '');
              }
              uploadBtn.disabled = false;
              uploadBtn.style.opacity = 1;
            });
        } else {
          throw new Error('Upload failed');
        }
      })
      .catch(err => {
        console.error(err);
        finishProgress(false);
        showToast('⛔ 上傳/更新錯誤', 'error', 2000);
        uploadBtn.disabled = false;
        uploadBtn.style.opacity = 1;
      });
  });

  tbody.appendChild(tr);
  card.style.display = 'block';
}

// 載入統計資料
function loadStats(){
  // 檢查 API URL 是否設定，未設定則直接略過，避免報錯刷屏
  if (GAS_API_URL.includes('你的部署ID') || !GAS_API_URL.startsWith('http')) {
      if (!hasWarnedUrl) {
          console.warn('GAS URL 未設定，暫停自動統計更新。');
          hasWarnedUrl = true; // 只警告一次
      }
      return;
  }

  if (statsBusy) return;
  statsBusy = true;
  callGasApi('getStatsData')
    .then(data => {
      const table = document.getElementById('statsTable');
      const tbody = table.querySelector('tbody');
      const empty = document.getElementById('statsEmpty');
      const rows = (data && data.rows) || [];
      const nextHash = JSON.stringify(rows);
      if (nextHash === statsHash) { statsBusy = false; return; }
      statsHash = nextHash;
      tbody.innerHTML = '';
      if (rows.length === 0) {
        table.style.display = 'none';
        empty.textContent = '— 無統計資料 —';
        empty.style.display = 'block';
      } else {
        rows.forEach(r => {
          const tr = document.createElement('tr');
          const td1 = document.createElement('td'); td1.textContent = r[0] ?? '';
          const td2 = document.createElement('td'); td2.textContent = r[1] ?? '';
          tr.append(td1, td2);
          tbody.appendChild(tr);
        });
        empty.style.display = 'none';
        table.style.display = 'table';
      }
      statsBusy = false;
    })
    .catch(err => {
      // 避免洗版 Console
      if (err.message !== 'GAS_URL_NOT_SET') {
          console.error(err);
          const empty = document.getElementById('statsEmpty');
          empty.textContent = '讀取統計失敗';
          empty.style.display = 'block';
          document.getElementById('statsTable').style.display = 'none';
      }
      statsBusy = false;
    });
}

  if (statsTimer) clearInterval(statsTimer);
  statsTimer = setInterval(() => {
    if (document.visibilityState === 'visible') loadStats();
  }, ms);
}
function stopStatsAutoRefresh(){
  if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
}

// 掃描器控制
function requestCameraOnTap() { startScanner(true); }
function stopScanner() {
  try {
    if (reader) reader.reset();
    if (videoEl && videoEl.srcObject) {
      videoEl.srcObject.getTracks().forEach(t => t.stop());
      videoEl.srcObject = null;
    }
  } catch (_) {}
  scanning = false;
  scanStartedAt = 0;
  camStatus.textContent = '已暫停';
  camDot.classList.remove('on');
}
function restartScanner() {
  stopScanner();
  setTimeout(() => startScanner(false), 200);
}

// 健康檢查與自動重啟
setInterval(() => {
  const empty = !scanInput.value.trim();
  // ✅ 修正：加入 !noCameraAvailable 條件：如果已經確定沒相機，就不要再嘗試重啟
  if (!scanning && empty && !cooling && !noCameraAvailable) { restartScanner(); return; }
  
  if (scanning && !cooling && scanStartedAt && (Date.now() - scanStartedAt > 40000)) {
    // 掃描太久休息一下
    cooling = true; stopScanner();
    setTimeout(() => {
      cooling = false;
      if (empty && !noCameraAvailable) startScanner(false); // ✅ 這裡也加
    }, 2000);
  }
}, 4000);

// 執行查詢
function runQuery(passedCode){
  const code = (passedCode ?? scanInput.value).trim();
  if (!code) { showToast('請輸入條碼!', 'error', 2000); scanInput.value = ''; return; }
  clearResult();
  const btn = document.getElementById('btnQuery');
  if (btn) { btn.disabled = true; btn.style.opacity = .7; }
  showProgress(0);

  callGasApi('findAssetByBarcode', { barcode: code })
    .then(res => {
      finishProgress(true);
      if (btn) { btn.disabled = false; btn.style.opacity = 1; }
      if (!res || !res.found) {
        showToast('查無此設備資料!', 'error', 2000);
      } else {
        renderResult(res.row);
      }
      // ✅ 修正：這裡不再自動清空 scanInput，改由 renderResult (成功顯示後) 清空
      // 如果查無資料，條碼會留在輸入框供使用者查看
    })
    .catch(err => {
      if (err.message !== 'GAS_URL_NOT_SET') {
          console.error(err);
          showToast('查詢失敗', 'error', 2000);
      }
      finishProgress(false);
      if (btn) { btn.disabled = false; btn.style.opacity = 1; }
      // ✅ 修正：發生錯誤時不清空，保留輸入內容
    });
}

// 掃描槍支援 (快速輸入偵測)
(function enableScannerGunAutoQuery(){
  const el = document.getElementById('scanResult');
  if (!el) return;
  let lastTs = 0, fastStrokes = 0, idleTimer = null, firing = false;
  function trigger(reason = ''){
    if (firing) return;
    const v = (el.value || '').trim();
    if (!v) return;
    // 長度大於等於6才視為有效條碼
    if (v.length >= 6){
      firing = true;
      runQuery(v);
      setTimeout(()=>{ firing = false; }, 600);
    }
  }
  el.addEventListener('keydown', (e) => {
    const now = performance.now();
    const dt = now - lastTs;
    lastTs = now;
    // 快速連續輸入判斷
    if (dt > 0 && dt < 35) fastStrokes++;
    if (e.key === 'Enter' || e.key === 'Tab'){ e.preventDefault(); trigger('enter/tab'); }
  });
  el.addEventListener('input', () => {
    if (idleTimer) clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      // ✅ 修正：放寬判斷標準 (延遲至 500ms)
      if (fastStrokes >= 3 && el.value.length >= 6){ trigger('idle'); }
      fastStrokes = 0;
    }, 500); // 延長至 500ms
  });
  el.addEventListener('paste', () => { setTimeout(() => trigger('paste'), 0); });
})();

// 頁面可見性改變時處理 (省電)
document.addEventListener('visibilitychange', () => {
  // 只有在系統畫面顯示時才執行
  if (document.getElementById('main-app').style.display !== 'none') {
      if (document.visibilityState === 'hidden') {
        stopStatsAutoRefresh();
        stopScanner();
      } else {
        if (!scanInput.value.trim()) restartScanner();
        startStatsAutoRefresh(5000);
      }
  }
});
</script>
</body>
</html>
